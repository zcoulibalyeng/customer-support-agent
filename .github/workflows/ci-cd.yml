name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # -----------------------------------------------------------------
  # Job 1: Lint and type check
  # -----------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run Ruff linter
        run: ruff check src/ tests/ api/ ui/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/ api/ ui/

  # -----------------------------------------------------------------
  # Job 2: Unit tests (no API key needed)
  # -----------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run guardrail tests
        run: python -m tests.test_guardrails

      - name: Run tool tests (SQLite only)
        run: python -m tests.test_tools

  # -----------------------------------------------------------------
  # Job 3: Integration tests (requires API key)
  # -----------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run classifier tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m tests.test_classifier

      - name: Run workflow tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m tests.test_workflow

  # -----------------------------------------------------------------
  # Job 4: Docker build
  # -----------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t customer-support-agent .

      - name: Verify API starts
        run: |
          docker run --rm -d --name test-agent \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -p 8000:8000 \
            customer-support-agent
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-agent

      - name: Verify Manager UI starts
        run: |
          # Test if the same image can run the manager command
          docker run --rm -d --name test-manager \
            -p 8502:8502 \
            customer-support-agent streamlit run ui/manager.py --server.port=8502
          sleep 10
          # Streamlit usually returns HTML, -f checks for 200 OK
          curl -f http://localhost:8502 || exit 1 
          docker stop test-manager
