services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped

  ui-chat:
    build: .
    command: streamlit run ui/chat.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  ui-manager:
    build: .
    # Note the change to manager.py and a different port (8502)
    command: streamlit run ui/manager.py --server.port=8502 --server.address=0.0.0.0
    ports:
      - "8502:8502"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
